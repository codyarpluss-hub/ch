        function App() {

          {showPay&&selPlan&&(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'flex-end'}}><div style={{background:'#fff',borderRadius:'18px 18px 0 0',width:'100%',maxWidth:'430px',margin:'0 auto',padding:'20px 18px 34px'}}>{!payDone?(<><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}><div><div style={{fontSize:'16px',fontWeight:700,color:'#1a1a2e'}}>پرداخت کارت‌به‌کارت</div><div style={{fontSize:'12px',color:'#4a5568',marginTop:'2px'}}>اشتراک {selPlan.name} — {fmt(selPlan.price)} تومان</div></div><button onClick={()=>{setShowPay(false);setPayDone(false);}} style={{background:'#f0f2f5',border:'none',borderRadius:'7px',padding:'7px',cursor:'pointer',display:'flex'}}><Icon name="X" size={15} color="#6b7280"/></button></div><div style={{background:C,borderRadius:'11px',padding:'14px',marginBottom:'16px',textAlign:'center'}}><div style={{color:'rgba(255,255,255,.6)',fontSize:'11px',marginBottom:'3px'}}>شماره کارت واریز</div><div style={{color:'#fff',fontSize:'17px',fontWeight:700,direction:'ltr',letterSpacing:'2px'}}>6104-3389-6112-6667</div><div style={{color:'rgba(255,255,255,.5)',fontSize:'10px',marginTop:'3px'}}>(مهدی عباسی)به نام: مدیریت کدیار</div></div><div style={{display:'flex',flexDirection:'column',gap:'9px',marginBottom:'12px'}}><div><label style={{fontSize:'12px',fontWeight:600,color:'#374151',display:'block',marginBottom:'5px'}}>نام صاحب کارت واریزکننده</label><input value={cardHolder} onChange={e=>setCardHolder(e.target.value)} placeholder="نام کامل" style={inp}/></div><div><label style={{fontSize:'12px',fontWeight:600,color:'#374151',display:'block',marginBottom:'5px'}}>شماره پیگیری تراکنش</label><input value={trackNum} onChange={e=>setTrackNum(e.target.value)} placeholder="مثال: 123456789" style={{...inp,direction:'ltr',textAlign:'left'}} type="tel"/></div></div><button onClick={doPay} disabled={payLoad||!cardHolder||!trackNum} style={{...primaryBtn,background:'#1e8449',opacity:(!cardHolder||!trackNum||payLoad)?.6:1,fontFamily:'inherit'}}>{payLoad?'در حال ثبت...':'✓ ثبت فیش پرداخت'}</button><div style={{textAlign:'center',fontSize:'11px',color:'#4a5568',marginTop:'7px'}}>پس از بررسی مدیریت (حداکثر ۲ ساعت) اشتراک فعال می‌شود</div></>):(<div style={{textAlign:'center',padding:'18px 0'}}><div style={{width:'60px',height:'60px',background:'#eafaf1',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:'30px'}}>✅</div><div style={{fontSize:'17px',fontWeight:700,color:'#1a1a2e',marginBottom:'6px'}}>فیش ثبت شد</div><div style={{fontSize:'13px',color:'#374151',marginBottom:'22px',lineHeight:1.6}}>پرداخت شما ثبت شد.<br/>پس از تایید مدیریت اشتراک فعال می‌شود.</div><button onClick={()=>{setShowPay(false);setPayDone(false);}} style={{...primaryBtn,fontFamily:'inherit'}}>متوجه شدم</button></div>)}</div></div>)}

          <div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:'430px',margin:'0 auto',background:'#fff',borderTop:'1px solid #eaecef',padding:'8px 6px 14px',display:'flex',justifyContent:'space-around',zIndex:100,boxShadow:'0 -2px 12px rgba(0,0,0,0.05)'}}>
            {[{id:'home',icon:'Home',label:'خانه'},{id:'search',icon:'Search',label:'کد خطا'},{id:'problems',icon:'AlertCircle',label:'مشکلات'},{id:'store',icon:'ShoppingBag',label:'فروشگاه'},{id:'profile',icon:'User',label:'پروفایل'}].map(t=>{
              const active=tab===t.id;
              return(<button key={t.id} onClick={()=>go(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',background:'none',border:'none',cursor:'pointer',color:active?R:'#4a5568',padding:'5px 10px',borderRadius:'9px',position:'relative',fontFamily:'inherit'}}><Icon name={t.icon} size={20} color={active?R:'#4a5568'}/><span style={{fontSize:'10px',fontWeight:active?600:400}}>{t.label}</span>{active&&<div style={{position:'absolute',bottom:'-2px',width:'20px',height:'2px',background:R,borderRadius:'2px'}}/>}</button>);
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
